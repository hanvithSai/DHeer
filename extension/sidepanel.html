<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHeer Side Panel</title>
  <style>
    :root {
      --primary: #9C64FB;
      --primary-hover: #8B5CF6;
      --background: #09090b;
      --card-bg: #18181b;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --input-bg: #09090b;
    }
    
    * {
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, var(--primary), #d8b4fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .user-info {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .user-info::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: #10b981;
      border-radius: 50%;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    input, textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(156, 100, 251, 0.2);
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      font-size: 14px;
      margin-top: 4px;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: #3f3f46;
      cursor: not-allowed;
      transform: none;
    }

    .hidden {
      display: none;
    }

    #status-message {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      font-weight: 500;
      min-height: 18px;
    }

    .auth-warning {
      text-align: center;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
    }

    .auth-warning p {
      color: var(--text-muted);
      font-size: 15px;
      margin: 0;
    }

    .auth-link {
      color: white;
      text-decoration: none;
      background: var(--primary);
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      width: 100%;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .recent-item {
      padding: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .recent-item:hover {
      border-color: var(--primary);
      background: #27272a;
    }

    .recent-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }

    .recent-url {
      font-size: 11px;
      color: var(--text-muted);
    }

    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="auth-check" class="hidden auth-warning">
      <div style="font-size: 40px; margin-bottom: 10px;">🔖</div>
      <p>Please log in to DHeer to save bookmarks.</p>
      <a href="#" id="login-link" class="auth-link">Open DHeer Web App</a>
    </div>

    <div id="main-content">
      <header>
        <h2>Add Bookmark</h2>
        <div id="user-display" class="user-info"></div>
      </header>

      <div class="card" style="margin-top:20px;">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Enter page title">
        </div>
        
        <div class="form-group">
          <label for="url">URL</label>
          <input type="text" id="url" placeholder="https://example.com">
        </div>

        <div class="form-group">
          <label for="tags">Tags</label>
          <input type="text" id="tags" placeholder="e.g. tech, design, inspiration">
        </div>

        <div class="form-group">
          <label for="note">Note</label>
          <textarea id="note" rows="3" placeholder="Add a personal note..."></textarea>
        </div>

        <button id="save-btn">Save to DHeer</button>
        <div id="status-message"></div>
      </div>
      
      <div style="margin-top: 24px;">
        <div class="section-title">Recent Bookmarks</div>
        <div id="recent-list" style="display: flex; flex-direction: column; gap: 10px;">
          <!-- Recent bookmarks will be loaded here -->
        </div>
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
