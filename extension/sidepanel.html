<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DHeer Companion</title>
  <style>
    :root {
      --primary: #c08552;
      --primary-hover: #895737;
      --background: #1a1412;
      --card-bg: #2a1f1b;
      --text: #f3e9dc;
      --text-muted: #895737;
      --border: #3d2b26;
    }
    
    * { box-sizing: border-box; transition: all 0.2s ease; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; background-color: var(--background); color: var(--text); font-size: 14px; }
    .hidden { display: none !important; }
    
    #auth-check { display: flex; flex-direction: column; items: center; justify-content: center; height: 100vh; padding: 24px; text-align: center; }
    .logo-large { width: 64px; height: 64px; background: rgba(192, 133, 82, 0.2); border-radius: 16px; display: flex; items-center: center; justify-content: center; font-size: 32px; margin-bottom: 24px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
    
    #main-content { height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(26, 20, 18, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
    .nav-tabs { display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.2); border-radius: 8px; }
    .nav-tab { padding: 8px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; }
    .nav-tab:hover { background: rgba(255,255,255,0.05); }
    .nav-tab.active { color: var(--primary); background: rgba(192, 133, 82, 0.1); }

    .window-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; }
    .window-btn:hover { background: rgba(192,133,82,0.12); color: var(--primary); }
    .window-controls { display: flex; align-items: center; gap: 2px; }

    /* Popup mode: add a subtle drag bar at the top */
    body.popup-mode header { cursor: default; -webkit-app-region: drag; }
    body.popup-mode header button, body.popup-mode header input { -webkit-app-region: no-drag; }
    body.popup-mode { border-radius: 12px; overflow: hidden; }

    main { flex: 1; overflow-y: auto; padding: 16px; }
    .label { font-size: 10px; text-transform: uppercase; font-weight: 900; color: var(--text-muted); tracking: 0.15em; margin-bottom: 8px; display: block; }
    input, textarea { width: 100%; background: var(--card-bg); border: 1px solid transparent; border-radius: 12px; padding: 12px; color: var(--text); font-size: 13px; margin-bottom: 16px; }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    
    .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(192, 133, 82, 0.2); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .insight-card { background: var(--card-bg); border-radius: 16px; padding: 24px; display: grid; grid-template-columns: 1fr 1px 1fr; gap: 16px; text-align: center; }
    .insight-value { font-size: 32px; font-weight: 700; }
    .insight-divider { background: var(--border); height: 100%; }
    
    .workspace-item { background: var(--card-bg); padding: 16px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid transparent; cursor: pointer; margin-bottom: 8px; }
    .workspace-item:hover { border-color: var(--primary); background: rgba(192, 133, 82, 0.05); }
  </style>
</head>
<body>
  <div id="auth-check" class="hidden">
    <div class="logo-large">🦌</div>
    <h1 style="font-size: 20px; margin-bottom: 8px;">Welcome to DHeer</h1>
    <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 32px;">Please log in to sync your bookmarks and track productivity.</p>
    <button id="login-link" class="btn-primary">Log In</button>
  </div>

  <div id="main-content" class="hidden">
    <header>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 32px; height: 32px; background: rgba(192, 133, 82, 0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px;">🦌</div>
        <span id="user-display" style="font-weight: 700; font-size: 14px;">DHeer</span>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <div class="nav-tabs">
          <button id="nav-bookmark" class="nav-tab active" title="Bookmarks">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
          </button>
          <button id="nav-companion" class="nav-tab" title="Companion">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </button>
        </div>
        <div class="window-controls">
          <!-- Popout button: visible only in sidepanel mode -->
          <button id="btn-popout" class="window-btn" title="Pop out to window">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
            </svg>
          </button>
          <!-- Dock button: visible only in popup mode -->
          <button id="btn-dock" class="window-btn hidden" title="Dock to sidebar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main>
      <div id="bookmark-section">
        <label class="label">Title</label>
        <input type="text" id="title">
        <label class="label">URL</label>
        <input type="text" id="url">
        <label class="label">Tags</label>
        <input type="text" id="tags" placeholder="work, research...">
        <label class="label">Notes</label>
        <textarea id="note" rows="3"></textarea>
        <button id="save-btn" class="btn-primary">Save to DHeer</button>
        <p id="status-message" style="text-align: center; font-size: 12px; margin-top: 12px; height: 18px;"></p>
        
        <div style="margin-top: 32px;">
          <label class="label">Recently Saved</label>
          <div id="recent-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
      </div>

      <div id="companion-section" class="hidden">
        <div style="margin-bottom: 32px;">
          <label class="label">Insights</label>
          <div class="insight-card">
            <div><div id="ext-tab-count" class="insight-value">--</div><div class="label" style="margin-bottom:0">Tabs</div></div>
            <div class="insight-divider"></div>
            <div><div id="ext-tab-switches" class="insight-value">--</div><div class="label" style="margin-bottom:0">Switches</div></div>
          </div>
        </div>
        
        <label class="label">Workspaces</label>
        <div id="ext-workspaces-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>
    </main>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
