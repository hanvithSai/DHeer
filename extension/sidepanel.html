<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMarkit Side Panel</title>
  <style>
    :root {
      --primary: #9C64FB;
      --background: #111111;
      --text: #ffffff;
      --card-bg: #1a1a1a;
      --border: #333;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background);
      color: var(--text);
      font-size: 14px;
    }
    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      color: var(--primary);
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    input, textarea {
      width: 100%;
      background: #000;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .hidden {
      display: none;
    }
    #status-message {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
    }
    .auth-warning {
      text-align: center;
      padding: 20px;
    }
    .auth-link {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="auth-check" class="hidden auth-warning">
      <p>Please log in to MMarkit to save bookmarks.</p>
      <a href="#" id="login-link" class="auth-link">Open MMarkit Web App</a>
    </div>

    <div id="main-content">
      <h2>Add Bookmark</h2>
      <div class="card">
        <label for="title" style="display:block; margin-bottom:4px; font-size:12px; color:#aaa;">Title</label>
        <input type="text" id="title" placeholder="Page Title">
        
        <label for="url" style="display:block; margin-bottom:4px; font-size:12px; color:#aaa;">URL</label>
        <input type="text" id="url" readonly style="color:#888;">

        <label for="tags" style="display:block; margin-bottom:4px; font-size:12px; color:#aaa;">Tags (comma separated)</label>
        <input type="text" id="tags" placeholder="tech, news, design">

        <label for="note" style="display:block; margin-bottom:4px; font-size:12px; color:#aaa;">Note</label>
        <textarea id="note" rows="3" placeholder="Add a note..."></textarea>

        <button id="save-btn">Save Bookmark</button>
        <div id="status-message"></div>
      </div>
      
      <div style="margin-top: 20px;">
        <h3 style="font-size: 14px; margin-bottom: 10px;">Recent Bookmarks</h3>
        <div id="recent-list" style="display: flex; flex-direction: column; gap: 8px;">
          <!-- Recent bookmarks will be loaded here -->
        </div>
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
